name: Nightly DB Backup

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: 'America/Fortaleza'
      BACKUP_DIR: 'db_backups'

    steps:
      - name: Create backup directory
        run: mkdir -p "${BACKUP_DIR}"

      - name: Prepare PostgreSQL 17 client
        run: docker run --rm postgres:17 pg_dump --version

      - name: Dump Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail

          stamp="$(date +%Y%m%d_%H%M%S)"
          dump_path="${BACKUP_DIR}/supabase_${stamp}.dump"
          toc_path="${dump_path}.toc"
          sha_path="${dump_path}.sha256"
          manifest_path="${BACKUP_DIR}/manifest_${stamp}.json"

          echo "Dump path: $dump_path"
          mkdir -p "${BACKUP_DIR}"

          docker run --rm \
            -e SUPABASE_DB_URL="${SUPABASE_DB_URL}" \
            -v "${PWD}/${BACKUP_DIR}:/backups" \
            postgres:17 \
            bash -lc "
              set -ex

              echo 'Running pg_dump...'
              pg_dump --format=custom \
                --compress=9 \
                --no-owner \
                --no-privileges \
                --file \"/backups/$(basename "$dump_path")\" \
                \"\$SUPABASE_DB_URL\"

              pg_restore -l \"/backups/$(basename "$dump_path")\" > \"/backups/$(basename "$toc_path")\"

              ls -lh /backups
            "

          ls -lh "${BACKUP_DIR}"

          test -s "${dump_path}"

          sha256sum "${dump_path}" | tee "${sha_path}"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: db_backups/*
          retention-days: 30
