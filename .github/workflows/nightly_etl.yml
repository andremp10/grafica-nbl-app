name: Nightly ETL

on:
  schedule:
    - cron: '0 4 * * *'

concurrency:
  group: nightly-etl-main
  cancel-in-progress: false

jobs:
  etl:
    name: ETL Nightly (schedule)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      BACKUP_PROTOCOL: ${{ secrets.BACKUP_PROTOCOL }}
      BACKUP_REMOTE_DIR: '/var/lib/vz/dump'
      BACKUP_FTP_REMOTE_DIR: '/public_html/.well-known/backup-jet'
      BACKUP_FILENAME_PREFIX: 'nblgrafica_app-'
      BACKUP_EXTENSION: '.sql'
      BACKUP_LOCAL_DIR: './backups'
      MYSQL_HOST: '127.0.0.1'
      MYSQL_PORT: '3307'
      MYSQL_USER: 'root'
      MYSQL_PASSWORD: 'root'
      MYSQL_DATABASE: 'legacy'
      ETL_BATCH_SIZE: '200'
      ETL_RETRIES: '6'
      ETL_VALIDATE_ONLY: '0'
      TRUNCATE_ENABLED: '1'
      TRUNCATE_TABLES_MODE: 'exec_order'
      TZ: 'America/Fortaleza'
      DOCKER_COMPOSE_FILE: 'docker-compose.yml'
      SQL_INPUT_DIR: './sql_input'
      LOGS_DIR: './logs'
      VERIFY_TABLES: 'is_pedidos,is_clientes'
      VERIFY_MIN_ROWS: '1'
      VERIFY_RECENCY_TABLE: 'is_pedidos'
      VERIFY_RECENCY_COLUMNS: 'updated_at,created_at,data'
      VERIFY_MAX_AGE_HOURS: '72'
      VERIFY_BASELINE_PATH: './backups/verify_baseline.json'

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: legacy
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm main branch schedule
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Nightly job must run from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p backups logs sql_input

      - name: Validate required env (production)
        env:
          BACKUP_SSH_KEY: ${{ secrets.BACKUP_SSH_KEY }}
          BACKUP_SFTP_HOST: ${{ secrets.BACKUP_SFTP_HOST }}
          BACKUP_SFTP_USER: ${{ secrets.BACKUP_SFTP_USER }}
          BACKUP_FTP_HOST: ${{ secrets.BACKUP_FTP_HOST }}
          BACKUP_FTP_USER: ${{ secrets.BACKUP_FTP_USER }}
          BACKUP_FTP_PASSWORD: ${{ secrets.BACKUP_FTP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          TRUNCATE_CONFIRM: ${{ secrets.TRUNCATE_CONFIRM }}
        run: python scripts/check_env.py --mode production

      - name: Setup SSH key for SFTP
        env:
          BACKUP_SSH_KEY: ${{ secrets.BACKUP_SSH_KEY }}
          BACKUP_SFTP_HOST: ${{ secrets.BACKUP_SFTP_HOST }}
          BACKUP_KNOWN_HOSTS: ${{ secrets.BACKUP_KNOWN_HOSTS }}
        run: |
          proto="$(echo "${BACKUP_PROTOCOL}" | tr '[:upper:]' '[:lower:]')"
          if [ "${proto}" != "sftp" ]; then
            echo "SFTP key setup skipped (BACKUP_PROTOCOL=${proto})"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "${BACKUP_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if [ -n "${BACKUP_KNOWN_HOSTS}" ]; then
            echo "${BACKUP_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p 22 "${BACKUP_SFTP_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          fi

      - name: Run daily job (retry up to 2)
        env:
          BACKUP_SFTP_HOST: ${{ secrets.BACKUP_SFTP_HOST }}
          BACKUP_SFTP_PORT: '22'
          BACKUP_SFTP_USER: ${{ secrets.BACKUP_SFTP_USER }}
          BACKUP_SSH_KEY_PATH: '~/.ssh/id_rsa'
          BACKUP_FTP_HOST: ${{ secrets.BACKUP_FTP_HOST }}
          BACKUP_FTP_PORT: '21'
          BACKUP_FTP_USER: ${{ secrets.BACKUP_FTP_USER }}
          BACKUP_FTP_PASSWORD: ${{ secrets.BACKUP_FTP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          TRUNCATE_CONFIRM: ${{ secrets.TRUNCATE_CONFIRM }}
        run: |
          attempts=2
          for attempt in $(seq 1 ${attempts}); do
            echo "daily_job attempt ${attempt}/${attempts}"
            if python scripts/daily_job.py; then
              echo "daily_job succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "${attempt}" -lt "${attempts}" ]; then
              sleep_time=$((attempt * 30))
              echo "daily_job failed, retrying in ${sleep_time}s"
              sleep "${sleep_time}"
            fi
          done
          echo "daily_job failed after ${attempts} attempts"
          exit 1

      - name: Verify Supabase load
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python scripts/verify_supabase_load.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: etl-logs-${{ github.run_id }}
          path: |
            logs/*.log
            backups/manifest.json
            backups/verify_baseline.json
          retention-days: 14
          if-no-files-found: warn
