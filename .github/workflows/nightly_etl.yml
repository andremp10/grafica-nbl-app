name: Nightly ETL

on:
  schedule:
    # TEMP diagnostic window: every 15 min for forensic evidence and rapid fix validation.
    # Revert to '0 4 * * *' before closing production rollout.
    - cron: '*/15 * * * *'

concurrency:
  group: nightly-etl-main
  cancel-in-progress: true

jobs:
  etl:
    name: ETL Nightly (schedule)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      BACKUP_PROTOCOL: ${{ secrets.BACKUP_PROTOCOL }}
      BACKUP_REMOTE_DIR: '/var/lib/vz/dump'
      BACKUP_FTP_REMOTE_DIR: '/public_html/.well-known/backup-jet'
      BACKUP_FILENAME_PREFIX: 'nblgrafica_app-'
      BACKUP_EXTENSION: '.sql'
      BACKUP_LOCAL_DIR: './backups'
      MYSQL_HOST: '127.0.0.1'
      MYSQL_PORT: '3307'
      MYSQL_USER: 'root'
      MYSQL_PASSWORD: 'root'
      MYSQL_DATABASE: 'nblgrafica_app'
      ETL_BATCH_SIZE: '200'
      ETL_RETRIES: '6'
      ETL_VALIDATE_ONLY: '0'
      TRUNCATE_ENABLED: '1'
      TRUNCATE_TABLES_MODE: 'exec_order'
      TZ: 'America/Fortaleza'
      DOCKER_COMPOSE_FILE: 'docker-compose.yml'
      SQL_INPUT_DIR: './sql_input'
      LOGS_DIR: './logs'
      VERIFY_TABLES: 'is_pedidos,is_clientes'
      VERIFY_MIN_ROWS: '1'
      VERIFY_RECENCY_TABLE: 'is_pedidos'
      VERIFY_RECENCY_COLUMNS: 'updated_at,created_at,data'
      VERIFY_MAX_AGE_HOURS: '72'
      VERIFY_MIN_DATE: '2026-01-25'
      VERIFY_MIN_DATE_TABLE: 'is_pedidos'
      VERIFY_MIN_DATE_COLUMNS: 'created_at,updated_at,data'
      VERIFY_MIN_DATE_MIN_ROWS: '1'
      VERIFY_BASELINE_PATH: './backups/verify_baseline.json'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm main branch schedule
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Nightly job must run from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p backups logs sql_input

      - name: Write workflow context log
        run: |
          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "backup_protocol=${BACKUP_PROTOCOL}"
            echo "backup_remote_dir=${BACKUP_REMOTE_DIR}"
            echo "backup_ftp_remote_dir=${BACKUP_FTP_REMOTE_DIR}"
            echo "backup_extension=${BACKUP_EXTENSION}"
            echo "mysql_host=${MYSQL_HOST}"
            echo "mysql_port=${MYSQL_PORT}"
            echo "mysql_database=${MYSQL_DATABASE}"
            echo "verify_tables=${VERIFY_TABLES}"
            echo "verify_min_date=${VERIFY_MIN_DATE}"
          } | tee logs/00_context.log

      - name: Validate required env (production)
        env:
          BACKUP_SSH_KEY: ${{ secrets.BACKUP_SSH_KEY }}
          BACKUP_SFTP_HOST: ${{ secrets.BACKUP_SFTP_HOST }}
          BACKUP_SFTP_USER: ${{ secrets.BACKUP_SFTP_USER }}
          BACKUP_FTP_HOST: ${{ secrets.BACKUP_FTP_HOST }}
          BACKUP_FTP_USER: ${{ secrets.BACKUP_FTP_USER }}
          BACKUP_FTP_PASSWORD: ${{ secrets.BACKUP_FTP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          TRUNCATE_CONFIRM: ${{ secrets.TRUNCATE_CONFIRM }}
        run: |
          set -o pipefail
          python scripts/check_env.py --mode production 2>&1 | tee logs/01_check_env.log

      - name: Setup SSH key for SFTP
        env:
          BACKUP_SSH_KEY: ${{ secrets.BACKUP_SSH_KEY }}
          BACKUP_SFTP_HOST: ${{ secrets.BACKUP_SFTP_HOST }}
          BACKUP_KNOWN_HOSTS: ${{ secrets.BACKUP_KNOWN_HOSTS }}
        run: |
          proto="$(echo "${BACKUP_PROTOCOL}" | tr '[:upper:]' '[:lower:]')"
          if [ "${proto}" != "sftp" ]; then
            echo "SFTP key setup skipped (BACKUP_PROTOCOL=${proto})"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "${BACKUP_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if [ -n "${BACKUP_KNOWN_HOSTS}" ]; then
            echo "${BACKUP_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p 22 "${BACKUP_SFTP_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          fi

      - name: Run daily job (retry up to 2)
        env:
          BACKUP_PROTOCOL: ${{ secrets.BACKUP_PROTOCOL }}
          BACKUP_REMOTE_DIR: '/var/lib/vz/dump'
          BACKUP_FTP_REMOTE_DIR: '/public_html/.well-known/backup-jet'
          BACKUP_FILENAME_PREFIX: 'nblgrafica_app-'
          BACKUP_EXTENSION: '.sql'
          BACKUP_LOCAL_DIR: './backups'
          BACKUP_SFTP_HOST: ${{ secrets.BACKUP_SFTP_HOST }}
          BACKUP_SFTP_PORT: '22'
          BACKUP_SFTP_USER: ${{ secrets.BACKUP_SFTP_USER }}
          BACKUP_SSH_KEY_PATH: '~/.ssh/id_rsa'
          BACKUP_FTP_HOST: ${{ secrets.BACKUP_FTP_HOST }}
          BACKUP_FTP_PORT: '21'
          BACKUP_FTP_USER: ${{ secrets.BACKUP_FTP_USER }}
          BACKUP_FTP_PASSWORD: ${{ secrets.BACKUP_FTP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          TRUNCATE_CONFIRM: ${{ secrets.TRUNCATE_CONFIRM }}
        run: |
          set -o pipefail
          : > logs/02_daily_job.log
          attempts=2
          for attempt in $(seq 1 ${attempts}); do
            echo "daily_job attempt ${attempt}/${attempts}" | tee -a logs/02_daily_job.log
            if python scripts/daily_job.py 2>&1 | tee -a logs/02_daily_job.log; then
              echo "daily_job succeeded on attempt ${attempt}" | tee -a logs/02_daily_job.log
              exit 0
            fi
            if [ "${attempt}" -lt "${attempts}" ]; then
              sleep_time=$((attempt * 30))
              echo "daily_job failed, retrying in ${sleep_time}s" | tee -a logs/02_daily_job.log
              sleep "${sleep_time}"
            fi
          done
          echo "daily_job failed after ${attempts} attempts" | tee -a logs/02_daily_job.log
          exit 1

      - name: Verify Supabase load
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -o pipefail
          python scripts/verify_supabase_load.py 2>&1 | tee logs/03_verify.log

      - name: Ensure artifact files exist
        if: always()
        run: |
          mkdir -p logs backups
          if [ ! -f logs/00_context.log ]; then
            echo "workflow context log not generated" > logs/00_context.log
          fi
          if [ ! -f backups/manifest.json ]; then
            cat > backups/manifest.json <<EOF
          {
            "status": "not_generated",
            "reason": "daily_job_failed_before_manifest",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}"
          }
          EOF
          fi
          if [ ! -f backups/verify_baseline.json ]; then
            echo "{}" > backups/verify_baseline.json
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: etl-logs-${{ github.run_id }}
          path: |
            logs/*.log
            backups/manifest.json
            backups/verify_baseline.json
          retention-days: 14
          if-no-files-found: warn
